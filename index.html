<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHIQUE B — Slogans</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --lime:#d8fe0d;
    --black:#000000;
    --white:#ffffff;
    --surface:#0b0b0b;
    --line:#1c1c1c;
    --muted:#8a8a8a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--black);
    color:var(--white);
    font-family:'Open Sans',system-ui,sans-serif;
    min-height:100%;
    display:flex;flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }
  .top{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 28px;border-bottom:1px solid var(--line);
  }
  .brandtag{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .swatches{display:flex;gap:8px;align-items:center}
  .sw{width:16px;height:16px;border-radius:3px;border:1px solid #2a2a2a}
  .sw.l{background:var(--lime)} .sw.b{background:#000} .sw.w{background:#fff}
  .swlbl{font-size:10px;color:var(--muted);letter-spacing:.1em;margin-left:6px}
  .tabs{display:flex;gap:6px;padding:18px 28px 0;justify-content:center}
  .tab{
    background:transparent;border:0;color:var(--muted);
    font-family:inherit;font-weight:800;font-size:13px;letter-spacing:.08em;
    text-transform:uppercase;padding:10px 18px;cursor:pointer;
    border-bottom:2px solid transparent;transition:.15s;
  }
  .tab:hover{color:#cfcfcf}
  .tab.active{color:var(--white);border-bottom-color:var(--lime)}
  main{flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 24px 64px}
  .panel{display:none;width:100%;animation:fade .35s ease}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* TAB 1 — grid 2x6 de lockups (logo + slogan) */
  .grid{
    display:grid;grid-template-columns:1fr 1fr;gap:18px;
    width:100%;max-width:1040px;margin:0 auto;
  }
  .cell{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:30px 30px 26px;display:flex;flex-direction:column;align-items:center;
    transition:.18s;
  }
  .cell:hover{border-color:#2f2f2f}
  .cell .logo{width:62%;max-width:240px;display:block;margin-bottom:18px}
  /* slogan esticado para a largura da logo */
  .lockslot{width:62%;max-width:240px}
  .slg{width:100%;display:block}
  .slg text{font-family:'Open Sans',sans-serif;font-weight:800;fill:var(--white)}
  .cell.ze{border-color:#3a4a07;background:#0e1102}
  .cell.ze .slg text{fill:var(--lime)}
  .zebadge{
    color:var(--lime);font-size:9px;font-weight:800;letter-spacing:.22em;
    text-transform:uppercase;margin-bottom:14px;
  }
  .cell .zespace{height:0}

  /* TAB 2 — lista sem logo */
  .panel-title{
    text-align:center;color:var(--muted);font-size:11px;font-weight:700;
    letter-spacing:.28em;text-transform:uppercase;margin-bottom:30px;
  }
  .stage{width:clamp(320px,76vw,720px);margin:0 auto}
  .more .slg text{font-weight:700;fill:var(--white)}
  .more .slg{margin:0 auto}
  .more .slg + .slg{margin-top:8px}
  .more .slg:hover text{fill:var(--lime)}

  footer{
    padding:18px 28px;border-top:1px solid var(--line);
    color:#5a5a5a;font-size:11px;letter-spacing:.06em;text-align:center;margin-top:auto;
  }
  footer b{color:var(--lime);font-weight:800}

  @media (max-width:600px){
    .grid{grid-template-columns:1fr}
    .cell .logo,.lockslot{width:78%}
  }
</style>
</head>
<body>

  <div class="top">
    <div class="brandtag">Chique B · Identidade</div>
    <div class="swatches">
      <span class="sw l"></span><span class="sw b"></span><span class="sw w"></span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="finalistas">Finalistas</button>
    <button class="tab" data-tab="mais">Mais opções</button>
  </div>

  <main>
    <!-- TAB 1: grid 2x6, logo + slogan em cada cell -->
    <section class="panel active" id="finalistas">
      <div class="grid">

        <div class="cell">
          <img class="logo" src="logo.png" alt="CHIQUE B">
          <div class="lockslot"><svg class="slg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet"><text x="500" y="86" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">O MELHOR PARA SUA CORRIDA</text></svg></div>
        </div>

        <div class="cell">
          <img class="logo" src="logo.png" alt="CHIQUE B">
          <div class="lockslot"><svg class="slg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet"><text x="500" y="86" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">SUA CORRIDA MERECE O MELHOR</text></svg></div>
        </div>

        <div class="cell">
          <img class="logo" src="logo.png" alt="CHIQUE B">
          <div class="lockslot"><svg class="slg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet"><text x="500" y="86" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">CORRA MAIS RÁPIDO</text></svg></div>
        </div>

        <div class="cell">
          <img class="logo" src="logo.png" alt="CHIQUE B">
          <div class="lockslot"><svg class="slg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet"><text x="500" y="86" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">BEST NO PÉ, CHIQUE NO PASSO</text></svg></div>
        </div>

        <div class="cell">
          <img class="logo" src="logo.png" alt="CHIQUE B">
          <div class="lockslot"><svg class="slg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet"><text x="500" y="86" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">ENERGIA EM CADA PASSADA</text></svg></div>
        </div>

        <div class="cell">
          <img class="logo" src="logo.png" alt="CHIQUE B">
          <div class="lockslot"><svg class="slg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet"><text x="500" y="86" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">O MELHOR CALÇA PRIMEIRO</text></svg></div>
        </div>

        <div class="cell">
          <img class="logo" src="logo.png" alt="CHIQUE B">
          <div class="lockslot"><svg class="slg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet"><text x="500" y="86" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">CORRA COM O MELHOR</text></svg></div>
        </div>

        <div class="cell">
          <img class="logo" src="logo.png" alt="CHIQUE B">
          <div class="lockslot"><svg class="slg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet"><text x="500" y="86" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">PERFORMANCE COM ESTILO</text></svg></div>
        </div>

        <div class="cell">
          <img class="logo" src="logo.png" alt="CHIQUE B">
          <div class="lockslot"><svg class="slg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet"><text x="500" y="86" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">ONDE CORRIDA VIRA ESTILO</text></svg></div>
        </div>

        <div class="cell">
          <img class="logo" src="logo.png" alt="CHIQUE B">
          <div class="lockslot"><svg class="slg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet"><text x="500" y="86" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">SEJA VISTO, SEJA RÁPIDO</text></svg></div>
        </div>

        <div class="cell">
          <img class="logo" src="logo.png" alt="CHIQUE B">
          <div class="lockslot"><svg class="slg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet"><text x="500" y="86" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">A ENERGIA COMEÇA NO PÉ</text></svg></div>
        </div>

        <div class="cell">
          <img class="logo" src="logo.png" alt="CHIQUE B">
          <div class="lockslot"><svg class="slg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet"><text x="500" y="86" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">FEITO PRA DISPARAR</text></svg></div>
        </div>

      </div>
    </section>

    <!-- TAB 2: mais opções, sem logo -->
    <section class="panel more" id="mais">
      <div class="panel-title">Mais opções de slogan</div>
      <div class="stage">
        <svg class="slg" viewBox="0 0 1000 90" preserveAspectRatio="xMidYMid meet"><text x="500" y="68" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">VELOCIDADE VESTIDA</text></svg>
        <svg class="slg" viewBox="0 0 1000 90" preserveAspectRatio="xMidYMid meet"><text x="500" y="68" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">MAIS RÁPIDO A CADA PASSADA</text></svg>
        <svg class="slg" viewBox="0 0 1000 90" preserveAspectRatio="xMidYMid meet"><text x="500" y="68" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">VISTA A VELOCIDADE</text></svg>
        <svg class="slg" viewBox="0 0 1000 90" preserveAspectRatio="xMidYMid meet"><text x="500" y="68" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">CORRA CHIQUE</text></svg>
        <svg class="slg" viewBox="0 0 1000 90" preserveAspectRatio="xMidYMid meet"><text x="500" y="68" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">PISA FORTE</text></svg>
        <svg class="slg" viewBox="0 0 1000 90" preserveAspectRatio="xMidYMid meet"><text x="500" y="68" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">ACELERA</text></svg>
        <svg class="slg" viewBox="0 0 1000 90" preserveAspectRatio="xMidYMid meet"><text x="500" y="68" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">A MELHOR LOJA DE TÊNIS DO BRASIL</text></svg>
        <svg class="slg" viewBox="0 0 1000 90" preserveAspectRatio="xMidYMid meet"><text x="500" y="68" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">RUN THE BEST</text></svg>
        <svg class="slg" viewBox="0 0 1000 90" preserveAspectRatio="xMidYMid meet"><text x="500" y="68" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">BUILT TO RUN</text></svg>
        <svg class="slg" viewBox="0 0 1000 90" preserveAspectRatio="xMidYMid meet"><text x="500" y="68" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs">YOUR BEST RUN STARTS HERE</text></svg>
      </div>
    </section>
  </main>

  <footer>CHIQUE B &nbsp;·&nbsp; estudo de slogan</footer>

<script>
  document.querySelectorAll('.tab').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});
      document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    });
  });
</script>
</body>
</html>
